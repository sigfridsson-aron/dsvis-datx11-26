<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
</head>

<body>
  <header class="site-header"></header>

  <main class="main-shell d-flex align-items-start">
    <section id="graphContainer" class="page-content mx-auto py-4 px-3 px-md-4 text-center">
      <h2 class="h5">Currently unfinished testing environ for graphs</h2>
      <label for="algorithmSelector" class="form-label fw-semibold d-block text-start">Choose a graph algorith:</label>
      <div class="selectorWrapper mx-auto mb-3">
        <select name="algorithmSelector" class="algorithmSelector form-select" id="algorithmSelector">
          <option disabled value="">
            &mdash; Please choose a data structure &mdash;
          </option>
          <hr />
          <option value="Depth">Depth-first-search</option>
        </select>
      </div>
      
      <fieldset class="algorithmControls canvas-controls-attached-top d-flex flex-wrap justify-content-start gap-2 text-start">
        <span class="formgroup d-inline-flex flex-wrap align-items-center gap-2">
          <select class="chooseGraphI disableWhenRunning form-select form-select-sm w-auto">
            <option value="" selected>Choose a graph</option>
            <option value="Directed">Directed graph</option>
            <option value="Undirected">Undirected graph</option>
            
            <option value="Mixed">Directed/Undirected graph</option>
            <option value="Tree">Tree graph</option>
          </select>
          <input class="chosengraph disableWhenRunning" type="hidden">
          <label class="d-inline-flex align-items-center gap-2">Start:
            <input class="start disableWhenRunning btn btn-outline-light btn-sm" type="submit" value="start" />
          </label>
        </span>
      </fieldset>

      <div>
      
        <svg> 
        </svg>
      </div>

      <fieldset class="generalControls canvas-controls-attached d-flex flex-wrap justify-content-start gap-2 text-start">
        <span class="formgroup media-controls d-inline-flex flex-wrap align-items-center gap-2">
          <button class="fastBackward btn btn-outline-light btn-sm media-btn" aria-label="Fast backward">⏮︎</button>
          <button class="stepBackward btn btn-outline-light btn-sm media-btn" aria-label="Step backward">⏪︎</button>
          <button class="toggleRunner btn btn-light btn-sm media-btn media-btn-run" aria-label="Run">Run</button>
          <button class="stepForward btn btn-outline-light btn-sm media-btn" aria-label="Step forward">⏩︎</button>
          <button class="fastForward btn btn-outline-light btn-sm media-btn" aria-label="Fast forward">⏭︎</button>
        </span>
        <span class="formgroup d-inline-flex flex-wrap align-items-center gap-2">
          <label>Speed:
            <select class="animationSpeed form-select form-select-sm w-auto d-inline-block">
              <option value="1200">Slowest</option>
              <option value="700" selected>Slow</option>
              <option value="300">Fast</option>
              <option value="100">Fastest</option>
            </select>
          </label>
        </span>
        <span class="formgroup d-inline-flex flex-wrap align-items-center gap-2">
          <label>Node size:
            <select class="objectSize form-select form-select-sm w-auto d-inline-block">
              <option value="12">Tiny</option>
              <option value="20">Small</option>
              <option value="28">Medium</option>
              <option value="40" selected>Large</option>
              <option value="50">Huge</option>
            </select>
          </label>
        </span>
      </fieldset>
    </section>
  </main>

  <footer class="site-footer py-3">
    <div class="container">
      <p class="mb-0 text-center">
        &copy;2024 <a href="https://github.com/heatherleaf">Peter Ljunglöf</a>,
        open source code
        <a href="https://github.com/ChalmersGU-data-structure-courses/dsvis">on GitHub</a>
      </p>
    </div>
  </footer>
</body>

</html>
