<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
</head>

<body>
  <header class="site-header"></header>

  <main class="main-shell d-flex align-items-center">
    <section id="avlquizContainer" class="page-content mx-auto py-4 px-3 px-md-4 text-center">
      <h2 class="h5">Playground for AVL trees</h2>

      <fieldset class="algorithmControls d-flex flex-wrap justify-content-center gap-2 mb-3">
        <span class="formgroup d-inline-flex flex-wrap align-items-center gap-2">
          <label>Create:
            <input class="insertField disableWhenRunning form-control form-control-sm w-auto d-inline-block" type="text" size="1" maxlength="4" />
            <input class="createLeft disableWhenRunning btn btn-outline-dark btn-sm" type="submit" value="Left child" />
            <input class="createRight disableWhenRunning btn btn-outline-dark btn-sm" type="submit" value="Right child" />
          </label>
        </span>
        <span class="formgroup d-inline-flex flex-wrap align-items-center gap-2">
          <label>Move to:
            <input class="moveParent disableWhenRunning btn btn-outline-dark btn-sm" type="submit" value="Parent" />
            <input class="moveLeft disableWhenRunning btn btn-outline-dark btn-sm" type="submit" value="Left child" />
            <input class="moveRight disableWhenRunning btn btn-outline-dark btn-sm" type="submit" value="Right child" />
          </label>
        </span>
        <span class="formgroup d-inline-flex flex-wrap align-items-center gap-2">
          <label>Rotate:
            <input class="rotateLeft disableWhenRunning btn btn-outline-dark btn-sm" type="submit" value="Left" />
            <input class="rotateRight disableWhenRunning btn btn-outline-dark btn-sm" type="submit" value="Right" />
          </label>
        </span>
        <span class="formgroup d-inline-flex flex-wrap align-items-center gap-2">
          <label>Action:
            <input class="markNode disableWhenRunning btn btn-outline-dark btn-sm" type="submit" value="Mark node" />
            <input class="copyToMark disableWhenRunning btn btn-outline-dark btn-sm" type="submit" value="Copy to mark" />
            <input class="deleteNode disableWhenRunning btn btn-outline-dark btn-sm" type="submit" value="Delete leaf" />
          </label>
        </span>
      </fieldset>

      <div>
        <svg></svg>
      </div>

      <fieldset class="generalControls d-flex flex-wrap justify-content-center gap-2 mt-3">
        <span class="formgroup d-inline-flex flex-wrap align-items-center gap-2">
          <input class="restartQuiz disableWhenRunning btn btn-outline-dark btn-sm" type="submit" value="Restart" />
        </span>
        <span class="formgroup d-inline-flex flex-wrap align-items-center gap-2">
          <button class="fastBackward btn btn-outline-dark btn-sm">&lt;&lt;</button>
          <button class="stepBackward btn btn-outline-dark btn-sm">&lt;</button>
          <button class="toggleRunner btn btn-dark btn-sm">Run</button>
          <button class="stepForward btn btn-outline-dark btn-sm">&gt;</button>
          <button class="fastForward btn btn-outline-dark btn-sm">&gt;&gt;</button>
        </span>
        <span class="formgroup d-inline-flex flex-wrap align-items-center gap-2">
          <label>Speed:
            <select class="animationSpeed form-select form-select-sm w-auto d-inline-block">
              <option value="1200">Slowest</option>
              <option value="700" selected>Slow</option>
              <option value="300">Fast</option>
              <option value="100">Fastest</option>
            </select>
          </label>
        </span>
        <span class="formgroup d-inline-flex flex-wrap align-items-center gap-2">
          <label>Node size:
            <select class="objectSize form-select form-select-sm w-auto d-inline-block">
              <option value="12">Tiny</option>
              <option value="20">Small</option>
              <option value="28">Medium</option>
              <option value="40" selected>Large</option>
              <option value="50">Huge</option>
            </select>
          </label>
        </span>
      </fieldset>
    </section>
  </main>

  <footer class="site-footer py-3">
    <div class="container">
      <p class="mb-0 text-center">
        &copy;2024 <a href="https://github.com/heatherleaf">Peter Ljunglöf</a>,
        open source code
        <a href="https://github.com/ChalmersGU-data-structure-courses/dsvis">on GitHub</a>
      </p>
    </div>
  </footer>
</body>

</html>
