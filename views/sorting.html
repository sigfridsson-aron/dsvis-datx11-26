<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
</head>

<body>
  <header class="site-header"></header>

  <main class="main-shell d-flex align-items-center">
    <section id="sortingContainer" class="page-content mx-auto py-4 px-3 px-md-4 text-center">

    <label for="algorithmSelector" class="form-label fw-semibold">Choose a sorting algorithm:</label>
    <div class="selectorWrapper mx-auto mb-3">
      <select name="algorithmSelector" class="algorithmSelector form-select" id="algorithmSelector">
        <option disabled value="">&mdash; Please choose an algorithm &mdash;</option>
        <hr />
        <option value="SelectionSort">Selection sort</option>
        <option value="MergeSort">Merge sort</option>
        <option value="InsertionSort">Insertion sort</option>
        <option value="QuickSort">Quick sort</option>
      </select>
    </div>

    <fieldset class="algorithmControls d-flex flex-wrap justify-content-center gap-2 mb-3">
      <span class="formgroup d-inline-flex flex-wrap align-items-center gap-2">
        <label for="insertSelect">Array size:</label>
        <select id="insertSelect" class="insertSelect disableWhenRunning form-select form-select-sm w-auto">
          <option value="tiny">Tiny (10)</option>
          <option value="small">Small (20)</option>
          <option value="medium">Medium (50)</option>
          <option value="large">Large (100)</option>
          <option value="huge">Huge (200)</option>
          <option value="custom">Custom values&hellip;</option>
        </select>
        <span id="customInsertContainer" class="customInsertContainer hidden">
          <input id="insertField" class="insertField disableWhenRunning form-control form-control-sm w-auto d-inline-block" type="text" size="10" maxlength="20" />
          <input id="insertSubmit" class="insertSubmit disableWhenRunning btn btn-outline-dark btn-sm" type="submit" value="Insert" />
        </span>
      </span>
      <span class="formgroup d-inline-flex flex-wrap align-items-center gap-2">
        <input class="sortSubmit disableWhenRunning btn btn-outline-dark btn-sm" type="submit" value="Sort" />
      </span>
      <span class="formgroup d-inline-flex flex-wrap align-items-center gap-2">
        <input class="clearSubmit disableWhenRunning btn btn-outline-dark btn-sm" type="submit" value="Clear" />
      </span>
      <!-- döp om till bättre namn -->
      <span class="formgroup d-inline-flex flex-wrap align-items-center gap-2">
        <select class="unsort disableWhenRunning form-select form-select-sm w-auto">
          <option value="" selected>Unsort Array</option>
          <option value="unsortRandom">Random</option>
          <option value="unsortReversed">Reversed</option>
        </select>
      </span>
    </fieldset>

    <div class="pseudoCode"></div>
    <div>
      <svg></svg>
    </div>

    <fieldset class="generalControls d-flex flex-wrap justify-content-center gap-2 mt-3">
      <span class="formgroup d-inline-flex flex-wrap align-items-center gap-2">
        <button class="fastBackward btn btn-outline-dark btn-sm">&lt;&lt;</button>
        <button class="stepBackward btn btn-outline-dark btn-sm">&lt;</button>
        <button class="toggleRunner btn btn-dark btn-sm">Run</button>
        <button class="stepForward btn btn-outline-dark btn-sm">&gt;</button>
        <button class="fastForward btn btn-outline-dark btn-sm">&gt;&gt;</button>
      </span>
      <span class="formgroup d-inline-flex flex-wrap align-items-center gap-2">
        <label>Speed:
          <select class="animationSpeed form-select form-select-sm w-auto d-inline-block">
            <option value="1200">Slowest</option>
            <option value="700" selected>Slow</option>
            <option value="300">Fast</option>
            <option value="100">Fastest</option>
          </select>
        </label>
      </span>
      <span class="formgroup d-inline-flex flex-wrap align-items-center gap-2">
        <label>Node size:
          <select class="objectSize form-select form-select-sm w-auto d-inline-block">
            <option value="12">Tiny</option>
            <option value="20">Small</option>
            <option value="28">Medium</option>
            <option value="40" selected>Large</option>
            <option value="50">Huge</option>
          </select>
        </label>
      </span>
      <span class="formgroup d-inline-flex flex-wrap align-items-center gap-2">
        <label>Scroll speed:
          <select class="scrollSpeed form-select form-select-sm w-auto d-inline-block">
            <option value="1">Slowest</option>
            <option value="2">Slow</option>
            <option value="5" selected>Medium</option>
            <option value="10">Fast</option>
            <option value="20">Fastest</option>
          </select>
        </label>
      </span>
      <span class="formgroup d-inline-flex flex-wrap align-items-center gap-2">
        <button class="moveLeft btn btn-outline-dark btn-sm">&lt;</button>
        <button class="moveUp btn btn-outline-dark btn-sm">^</button>
        <button class="moveDown btn btn-outline-dark btn-sm">v</button>
        <button class="moveRight btn btn-outline-dark btn-sm">&gt;</button>
        <button class="zoomIn btn btn-outline-dark btn-sm">+</button>
        <button class="zoomOut btn btn-outline-dark btn-sm">-</button>
      </span>
    </fieldset>

  </section>
  </main>

  <footer class="site-footer py-3">
    <div class="container">
      <p class="mb-0 text-center">&copy;2024 <a href="https://github.com/heatherleaf">Peter Ljunglöf</a>,
        open source code <a href="https://github.com/ChalmersGU-data-structure-courses/dsvis">on GitHub</a></p>
    </div>
  </footer>

</body>

</html>
