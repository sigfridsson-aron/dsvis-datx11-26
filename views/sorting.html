<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
</head>

<header>
  <h1><a href="index.html">Visualizations of data structures and algorithms</a></h1>
</header>

<main>
  <section id="sortingContainer">

    <label for="algorithmSelector">Choose a sorting algorithm:</label>
    <h2 class="selectorWrapper">
      <select name="algorithmSelector" class="algorithmSelector">
        <option disabled value="">&mdash; Please choose an algorithm &mdash;</option>
        <hr />
        <option value="SelectionSort">Selection sort</option>
        <option value="MergeSort">Merge sort</option>
        <option value="InsertionSort">Insertion sort</option>
        <option value="QuickSort">Quick sort</option>
      </select>
    </h2>

    <fieldset class="algorithmControls">
      <span class="formgroup">
        <label for="presetSizeSelect">Preset array sizes:</label>
        <select id="presetSizeSelect" class="presetSizeSelect disableWhenRunning">
          <option value="10">Tiny (10)</option>
          <option selected value="20">Small (20)</option>
          <option value="50">Medium (50)</option>
          <option value="100">Large (100)</option>
          <option value="200">Huge (200)</option>
          <option value="0">Empty</option>
        </select>

        <!-- Placeholder to hold values to be sent with the submit function (requires input field) -->
        <input id="presetSizeInputField" type="text" style="display: none;" disabled/>

      </span>
      <span class="formgroup">
        <label for="insertField">Insert values:</label>
        <input id="insertField" class="insertField disableWhenRunning" type="text" size="10" maxlength="20" />
        <input id="insertSubmit" class="insertSubmit disableWhenRunning" type="submit" value="Insert" />
      </span>
      <span class="formgroup">
        <input id="sortSubmit" class="sortSubmit disableWhenRunning" type="submit" value="Sort" />
      </span>
      <span class="formgroup">
        <input id="clearSubmit" class="clearSubmit disableWhenRunning" type="submit" value="Clear" />
      </span>
      <!-- döp om till bättre namn -->
      <span class="formgroup">
        <select id="unsortSelect" class="unsort disableWhenRunning">
          <option value="" selected>Unsort Array</option>
          <option value="unsortRandom">Random</option>
          <option value="unsortReversed">Reversed</option>
        </select>
      </span>
    </fieldset>

    <div class="pseudoCode"></div>
    <div>
      <svg></svg>
    </div>

    <fieldset class="generalControls">
      <span class="formgroup">
        <button class="fastBackward">&lt;&lt;</button>
        <button class="stepBackward">&lt;</button>
        <button class="toggleRunner">Run</button>
        <button class="stepForward">&gt;</button>
        <button class="fastForward">&gt;&gt;</button>
      </span>
      <span class="formgroup">
        <label>Speed:
          <select class="animationSpeed">
            <option value="1200">Slowest</option>
            <option value="700" selected>Slow</option>
            <option value="300">Fast</option>
            <option value="100">Fastest</option>
          </select>
        </label>
      </span>
      <span class="formgroup">
        <label>Node size:
          <select class="objectSize">
            <option value="12">Tiny</option>
            <option value="20">Small</option>
            <option value="28">Medium</option>
            <option value="40" selected>Large</option>
            <option value="50">Huge</option>
          </select>
        </label>
      </span>
      <span class="formgroup">
        <label>Scroll speed:
          <select class="scrollSpeed">
            <option value="1">Slowest</option>
            <option value="2">Slow</option>
            <option value="5" selected>Medium</option>
            <option value="10">Fast</option>
            <option value="20">Fastest</option>
          </select>
        </label>
      </span>
      <span class="formgroup">
        <button class="moveLeft">&lt;</button>
        <button class="moveUp">^</button>
        <button class="moveDown">v</button>
        <button class="moveRight">&gt;</button>
        <button class="zoomIn">+</button>
        <button class="zoomOut">-</button>
      </span>
    </fieldset>

  </section>
</main>

<footer>
  <p>&copy;2024 <a href="https://github.com/heatherleaf">Peter Ljunglöf</a>,
    open source code <a href="https://github.com/ChalmersGU-data-structure-courses/dsvis">on GitHub</a></p>
</footer>

</body>

</html>
